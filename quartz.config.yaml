# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Computer Science Knowledge Base
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: en-US
  baseUrl: kieranwood.ca/compsci
  ignorePatterns:
    - private
    - templates
    - .obsidian
    -  _meta
    - "**.excalidraw.md"
    - Events
    - "**TODO).md"
    - "**.excalidraw"
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#f9f5d7"        # bg0_h
        lightgray: "#ebdbb2"    # bg1
        gray: "#bdae93"         # bg3
        darkgray: "#7c6f64"     # fg4
        dark: "#3c3836"         # fg1
        secondary: "#b16286"    # aqua (primary accent)
        tertiary: "#458588"     # blue (secondary accent)
        highlight: "rgba(80, 73, 69, 0.15)"  # subtle warm highlight
        textHighlight: "#fabd2f88"           # yellow highlight

      darkMode:
        light: "#1d2021"        # bg0_h
        lightgray: "#3c3836"    # bg1
        gray: "#665c54"         # bg3
        darkgray: "#d5c4a1"     # fg1
        dark: "#fbf1c7"         # fg0
        secondary: "#b16286"    # aqua (primary accent)
        tertiary: "#83a598"     # blue (secondary accent)
        highlight: "rgba(168, 153, 132, 0.15)"
        textHighlight: "#fabd2f88"

    # colors:
    #   lightMode:
    #     light: "#faf8f8"
    #     lightgray: "#e5e5e5"
    #     gray: "#b8b8b8"
    #     darkgray: "#4e4e4e"
    #     dark: "#2b2b2b"
    #     secondary: "#a661ff"
    #     tertiary: "#d461ff"
    #     highlight: "rgba(143, 159, 169, 0.15)"
    #     textHighlight: "#fff23688"
    #   darkMode:
    #     light: "#161618"
    #     lightgray: "#393639"
    #     gray: "#646464"
    #     darkgray: "#d4d4d4"
    #     dark: "#ebebec"
    #     secondary: "#a661ff"
    #     tertiary: "#d461ff"
    #     highlight: "rgba(143, 159, 169, 0.15)"
    #     textHighlight: "#b3aa0288"
plugins:
  - source: github:Descent098/footer
    enabled: true
    options:
      links:
        "Author Site": "https://kieranwood.ca"
        "Content licensed under CC BY-SA 4.0": https://creativecommons.org/licenses/by-sa/4.0/?ref=chooser-v1
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: gruvbox-light-hard
        dark: gruvbox-dark-hard
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      comments: true
      highlight: true
      wikilinks: true
      callouts: true
      mermaid: true
      parseTags: true
      parseArrows: true
      parseBlockReferences: true
      enableInHtmlEmbed: false
      enableYouTubeEmbed: true
      enableVideoEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: true
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
    options:
      colorScheme: darkMode
      defaultDescription: ""
      defaultTitle: ""
  # - source: github:quartz-community/cname
  #   enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: beforeBody
      display: desktop
      priority: 20
  - source: github:quartz-community/table-of-contents
    enabled: true
    layout:
      display: [mobile, tablet]
    order: 50
  - source: github:quartz-community/table-of-contents
    enabled: true
    layout:
      position: right
      display: desktop
    order: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options: {}
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
  - source:
      name: quartz-themes
      repo: github:saberzero1/quartz-themes
      subdir: plugin
    enabled: true
    options:
      theme: default
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
